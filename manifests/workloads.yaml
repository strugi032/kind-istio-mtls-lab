apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-client
  labels:
    app.kubernetes.io/name: mesh-client
    app.kubernetes.io/component: client
    app.kubernetes.io/part-of: istio-mtls-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mesh-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mesh-client
        app.kubernetes.io/component: client
        app.kubernetes.io/part-of: istio-mtls-lab
    spec:
      containers:
        - name: mesh-client
          image: curlimages/curl:8.11.1
          command:
            - /bin/sh
            - -c
            - sleep infinity
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -d /proc/1
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -d /proc/1
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-server
  labels:
    app.kubernetes.io/name: httpbin-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: istio-mtls-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbin-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbin-server
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: istio-mtls-lab
    spec:
      containers:
        - name: httpbin-server
          image: mccutchen/go-httpbin:v2.15.0
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /get
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status/200
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: httpbin-server
  labels:
    app.kubernetes.io/name: httpbin-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: istio-mtls-lab
spec:
  selector:
    app.kubernetes.io/name: httpbin-server
  ports:
    - name: http
      port: 8000
      targetPort: 80
---
